/* ---------------- access-code validation ----------------
   Typo-catching checksum only — real authorization happens server-side in the Zap.
   Canonical algorithm: MUST match the admin invite generator exactly. */
const CODE_AB = "ABCDEFGHJKMNPQRSTUVWXYZ23456789"; // 31 chars, no 0/O/1/I/L
function codeChecksum(x) {
  let h = 7;
  for (const c of x) h = (h * 37 + CODE_AB.indexOf(c) * 13 + 29) % 923521;
  let o = "";
  for (let i = 0; i < 4; i++) { o = CODE_AB[h % 31] + o; h = Math.floor(h / 31); }
  return o;
}
const CODE_RE = /^SCOUT-([A-Z2-9]{4})-([A-Z2-9]{4})$/;
function isValidCode(code) {
  const m = (code || "").trim().toUpperCase().match(CODE_RE);
  return !!m && codeChecksum(m[1]) === m[2];
}

/* ---------------- helpers ---------------- */
function loadScript(src) {
  return new Promise((resolve, reject) => {
    if (document.querySelector(`script[src="${src}"]`)) return resolve();
    const s = document.createElement("script");
    s.src = src; s.onload = resolve; s.onerror = () => reject(new Error("Failed to load " + src));
    document.head.appendChild(s);
  });
}

async function extractPdf(file) {
  await loadScript("https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js");
  window.pdfjsLib.GlobalWorkerOptions.workerSrc =
    "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
  const data = await file.arrayBuffer();
  const pdf = await window.pdfjsLib.getDocument({ data }).promise;
  let text = "";
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    text += content.items.map(it => it.str).join(" ") + "\n";
  }
  return text.trim();
}

async function extractDocx(file) {
  await loadScript("https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js");
  const arrayBuffer = await file.arrayBuffer();
  const result = await window.mammoth.extractRawText({ arrayBuffer });
  return (result?.value || "").trim();
}

function extractEmail(text) {
  const m = (text || "").match(/[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}/);
  return m ? m[0] : "";
}

function extractName(text) {
  // Resumes almost always start with the person's name: grab 2-4 leading capitalized words.
  const head = (text || "").trim().slice(0, 120);
  const m = head.match(/^([A-ZÀ-Ý][A-Za-zÀ-ÿ'’.-]+(?:\s+[A-ZÀ-Ý][A-Za-zÀ-ÿ'’.-]+){1,3})/);
  if (!m) return "";
  const candidate = m[1].trim();
  // Reject if it looks like a heading, email, or is too long
  if (/resume|curriculum|vitae|@/i.test(candidate) || candidate.length > 40) return "";
  return candidate;
}

function extractKeywords(text) {
  const found = [];
  const lower = (text || "").toLowerCase();
  for (const kw of ROLE_KEYWORDS) {
    if (lower.includes(kw.toLowerCase()) && !found.includes(kw.trim())) found.push(kw.trim());
    if (found.length >= 5) break;
  }
  return found;
}

function Autocomplete({ value, onChange, options, placeholder, disabled }) {
  const [open, setOpen] = useState(false);
  const [hi, setHi] = useState(-1);
  const wrapRef = useRef(null);

  const filtered = useMemo(() => {
    const opts = options ?? [];
    const q = (value || "").toLowerCase().trim();
    if (!q) return opts.slice(0, 50);
    return opts.filter(o => o?.toLowerCase()?.includes(q)).slice(0, 50);
  }, [options, value]);

  useEffect(() => {
    const onDoc = e => { if (!wrapRef.current?.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", onDoc);
    return () => document.removeEventListener("mousedown", onDoc);
  }, []);

  const pick = v => { onChange(v); setOpen(false); setHi(-1); };

  return (
    <div ref={wrapRef} className="relative">
      <input
        className={inputCls + (disabled ? " opacity-50 cursor-not-allowed" : "")}
        value={value || ""}
        placeholder={placeholder}
        disabled={disabled}
        onChange={e => { onChange(e.target.value); setOpen(true); setHi(-1); }}
        onFocus={() => !disabled && setOpen(true)}
        onKeyDown={e => {
          if (e.key === "ArrowDown") { e.preventDefault(); setOpen(true); setHi(h => Math.min(h + 1, filtered.length - 1)); }
          else if (e.key === "ArrowUp") { e.preventDefault(); setHi(h => Math.max(h - 1, 0)); }
          else if (e.key === "Enter" && open && hi >= 0 && filtered[hi]) { e.preventDefault(); pick(filtered[hi]); }
          else if (e.key === "Escape") setOpen(false);
        }}
      />
      {open && filtered.length > 0 && (
        <ul className="absolute z-20 mt-1 w-full max-h-52 overflow-auto rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 shadow-lg text-sm">
          {filtered.map((o, i) => (
            <li key={o + i}
              className={"px-3.5 py-2 cursor-pointer " + (i === hi ? "bg-sky-100 dark:bg-sky-900/40 text-sky-900 dark:text-sky-200" : "text-slate-700 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800")}
              onMouseEnter={() => setHi(i)}
              onMouseDown={e => { e.preventDefault(); pick(o); }}>
              {o}
            </li>
          ))}
        </ul>
      )}
    </div>
  );
}

}

/* ---------------- dropzone ---------------- */
function Dropzone({ onFile, status, fileName, error }) {
  const inputRef = useRef(null);
  const [drag, setDrag] = useState(false);

  const handleFiles = useCallback(files => {
    const f = files?.[0];
    if (f) onFile(f);
  }, [onFile]);

  return (
    <div
      role="button" tabIndex={0}
      onClick={() => inputRef.current?.click()}
      onKeyDown={e => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); inputRef.current?.click(); } }}
      onDragEnter={e => { e.preventDefault(); e.stopPropagation(); setDrag(true); }}
      onDragOver={e => { e.preventDefault(); e.stopPropagation(); setDrag(true); }}
      onDragLeave={e => { e.preventDefault(); e.stopPropagation(); setDrag(false); }}
      onDrop={e => { e.preventDefault(); e.stopPropagation(); setDrag(false); handleFiles(e.dataTransfer?.files); }}
      className={"cursor-pointer rounded-xl border-2 border-dashed px-6 py-8 text-center transition select-none " +
        (drag
          ? "border-sky-500 bg-sky-50 dark:bg-sky-950/40"
          : "border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 hover:border-sky-400 dark:hover:border-sky-600")}>
      <input ref={inputRef} type="file" accept=".pdf,.docx,.txt" className="hidden"
        onChange={e => { handleFiles(e.target.files); e.target.value = ""; }} />
      {status === "analyzing" ? (
        <div className="flex items-center justify-center gap-3 text-sky-700 dark:text-sky-400">
          <svg className="animate-spin h-5 w-5" viewBox="0 0 24 24" fill="none">
            <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" />
            <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z" />
          </svg>
          <span className="text-sm font-medium">Analyzing resume…</span>
        </div>
      ) : status === "done" ? (
        <div className="text-sm">
          <span className="inline-flex items-center gap-2 font-medium text-emerald-600 dark:text-emerald-400">
            <svg className="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.7-9.3a1 1 0 00-1.4-1.4L9 10.6 7.7 9.3a1 1 0 00-1.4 1.4l2 2a1 1 0 001.4 0l4-4z" clipRule="evenodd" /></svg>
            {fileName}
          </span>
          <p className="mt-1 text-xs text-slate-400 dark:text-slate-500">Resume parsed. Click or drop to replace.</p>
        </div>
      ) : (
        <div>
          <svg className="mx-auto h-8 w-8 text-slate-400 dark:text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="1.5">
            <path strokeLinecap="round" strokeLinejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" />
          </svg>
          <p className="mt-2 text-sm font-medium text-slate-700 dark:text-slate-300">Drop your resume here, or click to browse</p>
          <p className="mt-1 text-xs text-slate-400 dark:text-slate-500">PDF, DOCX, or TXT</p>
        </div>
      )}
      {error && <p className="mt-2 text-xs font-medium text-red-500">{error}</p>}
    </div>
  );
}

/* ---------------- app ---------------- */
function App() {
  const [dark, setDark] = useState(false);
  useEffect(() => { document.documentElement.classList.toggle("dark", dark); }, [dark]);

  const [mode, setMode] = useState("setup"); // "setup" | "pause"
  const [accessCode, setAccessCode] = useState("");
  const [codeValid, setCodeValid] = useState(null); // null | true | false
  const [name, setName] = useState("");
  const [email, setEmail] = useState("");
  const [resumeText, setResumeText] = useState("");
  const [resumeStatus, setResumeStatus] = useState("idle"); // idle | analyzing | done
  const [resumeName, setResumeName] = useState("");
  const [resumeError, setResumeError] = useState("");
  const [roles, setRoles] = useState("");
  const [country, setCountry] = useState("United States");
  const [state, setState] = useState("");
  const [city, setCity] = useState("");
  const [remote, setRemote] = useState("Any");
  const [salMin, setSalMin] = useState(100000);
  const [salMax, setSalMax] = useState(200000);
  const [seniority, setSeniority] = useState("Any");
  const [frequency, setFrequency] = useState("Daily");
  const [submitting, setSubmitting] = useState(false);
  const [submitError, setSubmitError] = useState("");
  const [done, setDone] = useState(false);
  const [doneMode, setDoneMode] = useState("setup"); // which flow produced the success screen

  // live access-code check — checksum only; final authorization is server-side in the Zap
  useEffect(() => {
    if (!accessCode) { setCodeValid(null); return; }
    setCodeValid(isValidCode(accessCode));
  }, [accessCode]);

  const states = useMemo(() => Object.keys(GEO?.[country] ?? {}), [country]);
  const cities = useMemo(() => GEO?.[country]?.[state] ?? [], [country, state]);

  const onFile = useCallback(async file => {
    setResumeError("");
    const ext = (file?.name?.split(".").pop() || "").toLowerCase();
    if (!["pdf", "docx", "txt"].includes(ext)) {
      setResumeError("Unsupported file type — please use .pdf, .docx, or .txt");
      return;
    }
    setResumeStatus("analyzing");
    setResumeName(file.name);
    const started = Date.now();
    try {
      let text = "";
      if (ext === "pdf") text = await extractPdf(file);
      else if (ext === "docx") text = await extractDocx(file);
      else text = (await file.text()).trim();

      const kws = extractKeywords(text);
      const foundName = extractName(text);
      const foundEmail = extractEmail(text);
      const wait = Math.max(0, 1500 - (Date.now() - started));
      setTimeout(() => {
        setResumeText(text);
        if (kws.length) setRoles(prev => prev ? prev : kws.join(", "));
        if (foundName) setName(prev => prev ? prev : foundName);
        if (foundEmail) setEmail(prev => prev ? prev : foundEmail);
        setResumeStatus("done");
      }, wait);
    } catch (err) {
      console.error("Resume extraction failed:", err);
      setResumeStatus("idle");
      setResumeError("Could not read that file. Try a different format.");
    }
  }, []);

  const canSubmit = mode === "pause"
    ? (codeValid === true && !submitting)
    : (codeValid === true && name.trim() && email.trim() && resumeText && !submitting);

  async function submit() {
    if (!canSubmit) return;
    setSubmitting(true);
    setSubmitError("");
    const code = accessCode.trim().toUpperCase();
    const regions = [city, state, country].filter(Boolean).join(", ");
    // Payload keys are identical across both flows (contract unchanged).
    // Pause is signalled purely by frequency === "Paused"; other fields are ignored
    // by the Zap's paused branch, so we send safe empties.
    const payload = mode === "pause"
      ? {
          access_code: code,
          name: "",
          email: "",
          resume_text: "",
          target_roles: "",
          regions: "",
          remote: "",
          min_salary: 0,
          seniority: "",
          frequency: "Paused",
          submitted_at: new Date().toISOString()
        }
      : {
          access_code: code,
          name: name.trim(),
          email: email.trim(),
          resume_text: resumeText,
          target_roles: roles.trim(),
          regions,
          remote,
          min_salary: salMin,
          seniority,
          frequency,
          submitted_at: new Date().toISOString()
        };
    try {
      const res = await fetch(HOOK_URL, { method: "POST", body: JSON.stringify(payload) });
      if (!res.ok) throw new Error("HTTP " + res.status);
      setDoneMode(mode);
      setDone(true);
    } catch (err) {
      console.error("Submit failed:", err);
      setSubmitError(mode === "pause"
        ? "Something went wrong pausing your agent. Please try again."
        : "Something went wrong sending your info. Please try again.");
    } finally {
      setSubmitting(false);
    }
  }

  function reset() {
    setMode("setup");
    setAccessCode(""); setCodeValid(null);
    setName(""); setEmail("");
    setResumeText(""); setResumeStatus("idle"); setResumeName(""); setResumeError("");
    setRoles(""); setCountry("United States"); setState(""); setCity("");
    setRemote("Any"); setSalMin(100000); setSalMax(200000);
    setSeniority("Any"); setFrequency("Daily");
    setSubmitError(""); setDone(false);
  }

  function switchMode(next) {
    setMode(next);
    setSubmitError("");
  }

  return (
    <div className="min-h-screen py-10 px-4">
      <div className="mx-auto max-w-xl">
        {/* header */}
        <div className="flex items-start justify-between mb-8">
          <div>
            <div className="flex items-center gap-2.5">
              <div className="h-9 w-9 rounded-xl bg-gradient-to-br from-sky-500 to-blue-600 flex items-center justify-center shadow">
                <svg className="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                  <path strokeLinecap="round" strokeLinejoin="round" d="M21 21l-4.35-4.35M17 11a6 6 0 11-12 0 6 6 0 0112 0z" />
                </svg>
              </div>
              <h1 className="text-2xl font-bold tracking-tight text-slate-900 dark:text-white">Job Scout</h1>
            </div>
            <p className="mt-1 text-sm text-slate-500 dark:text-slate-400">For friends &amp; invitees</p>
          </div>
          <button type="button" onClick={() => setDark(d => !d)} aria-label="Toggle dark mode"
            className="rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 p-2 text-slate-500 dark:text-slate-400 hover:text-sky-600 dark:hover:text-sky-400 transition">
            {dark ? (
              <svg className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M12 3v1.5M12 19.5V21M4.2 4.2l1.06 1.06M18.74 18.74l1.06 1.06M3 12h1.5M19.5 12H21M4.2 19.8l1.06-1.06M18.74 5.26l1.06-1.06M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
            ) : (
              <svg className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M21.75 15A9.75 9.75 0 019 2.25 9.75 9.75 0 1021.75 15z" /></svg>
            )}
          </button>
        </div>

        {done ? (
          /* success view */
          <div className="rounded-2xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 p-10 text-center shadow-sm">
            {doneMode === "pause" ? (
              <>
                <div className="mx-auto h-14 w-14 rounded-full bg-amber-100 dark:bg-amber-900/40 flex items-center justify-center">
                  <svg className="h-7 w-7 text-amber-600 dark:text-amber-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5"><path strokeLinecap="round" strokeLinejoin="round" d="M9 8.25v7.5M15 8.25v7.5" /></svg>
                </div>
                <h2 className="mt-5 text-xl font-bold text-slate-900 dark:text-white">Agent paused ⏸️</h2>
                <p className="mt-2 text-sm text-slate-500 dark:text-slate-400">
                  Your scout is on hold — no more matches for now. Congrats if you found a role! Come back and set it up again whenever you like.
                </p>
                <button type="button" onClick={reset}
                  className="mt-6 rounded-lg bg-sky-600 hover:bg-sky-700 px-5 py-2.5 text-sm font-semibold text-white transition shadow-sm">
                  Done
                </button>
              </>
            ) : (
              <>
                <div className="mx-auto h-14 w-14 rounded-full bg-emerald-100 dark:bg-emerald-900/40 flex items-center justify-center">
                  <svg className="h-7 w-7 text-emerald-600 dark:text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5"><path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7" /></svg>
                </div>
                <h2 className="mt-5 text-xl font-bold text-slate-900 dark:text-white">Agent deployed 🎯</h2>
                <p className="mt-2 text-sm text-slate-500 dark:text-slate-400">
                  Your scout is set up. Watch your inbox — matching roles will start arriving on your chosen schedule.
                </p>
                <button type="button" onClick={reset}
                  className="mt-6 rounded-lg bg-sky-600 hover:bg-sky-700 px-5 py-2.5 text-sm font-semibold text-white transition shadow-sm">
                  Set up another
                </button>
              </>
            )}
          </div>
        ) : (
          /* form */
          <div className="rounded-2xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 p-6 sm:p-8 shadow-sm">
            {/* mode toggle */}
            <div className="mb-6 grid grid-cols-2 gap-2">
              <button type="button" onClick={() => switchMode("setup")}
                className={"rounded-lg border px-3 py-2.5 text-sm font-medium transition " +
                  (mode === "setup"
                    ? "border-sky-600 bg-sky-600 text-white shadow-sm"
                    : "border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-600 dark:text-slate-400 hover:border-sky-400 dark:hover:border-sky-600")}>
                Set up / update
              </button>
              <button type="button" onClick={() => switchMode("pause")}
                className={"rounded-lg border px-3 py-2.5 text-sm font-medium transition " +
                  (mode === "pause"
                    ? "border-amber-500 bg-amber-500 text-white shadow-sm"
                    : "border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-600 dark:text-slate-400 hover:border-amber-400 dark:hover:border-amber-500")}>
                Pause — I found a role
              </button>
            </div>

            <Field label="Access token">
              <div className="relative">
                <input className={inputCls + " pr-10 font-mono tracking-wide"} value={accessCode}
                  placeholder="SCOUT-XXXX-XXXX"
                  onChange={e => setAccessCode(e.target.value.toUpperCase())} autoComplete="off" spellCheck="false" />
                {codeValid !== null && (
                  <span className="absolute right-3 top-1/2 -translate-y-1/2">
                    {codeValid
                      ? <svg className="h-5 w-5 text-emerald-500" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.7-9.3a1 1 0 00-1.4-1.4L9 10.6 7.7 9.3a1 1 0 00-1.4 1.4l2 2a1 1 0 001.4 0l4-4z" clipRule="evenodd" /></svg>
                      : <svg className="h-5 w-5 text-red-400" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.7 7.3a1 1 0 00-1.4 1.4L8.6 10l-1.3 1.3a1 1 0 101.4 1.4L10 11.4l1.3 1.3a1 1 0 001.4-1.4L11.4 10l1.3-1.3a1 1 0 00-1.4-1.4L10 8.6 8.7 7.3z" clipRule="evenodd" /></svg>}
                  </span>
                )}
              </div>
              {codeValid === false && <p className="mt-1 text-xs font-medium text-red-500">That token doesn't look right. Check your invite.</p>}
            </Field>

            {mode === "pause" ? (
              /* pause flow — code only */
              <>
                <p className="mb-5 text-sm text-slate-500 dark:text-slate-400">
                  Found a role, or need a break? Enter your access token and we'll pause your scout — no more match emails until you set it up again.
                </p>
                {submitError && (
                  <p className="mb-4 rounded-lg bg-red-50 dark:bg-red-950/40 border border-red-200 dark:border-red-900 px-3.5 py-2.5 text-sm text-red-600 dark:text-red-400">{submitError}</p>
                )}
                <button type="button" onClick={submit} disabled={!canSubmit}
                  className={"w-full rounded-xl py-3.5 text-sm font-bold tracking-wide transition shadow-sm " +
                    (canSubmit
                      ? "bg-gradient-to-r from-amber-500 to-orange-600 text-white hover:from-amber-600 hover:to-orange-700"
                      : "bg-slate-200 dark:bg-slate-800 text-slate-400 dark:text-slate-600 cursor-not-allowed")}>
                  {submitting ? "Pausing…" : "Pause my agent"}
                </button>
                {codeValid !== true && (
                  <p className="mt-2 text-center text-xs text-slate-400 dark:text-slate-500">Enter your access token to pause.</p>
                )}
              </>
            ) : (
              /* setup / update flow — full form */
              <>
                <div className="grid sm:grid-cols-2 gap-4">
                  <Field label="Name">
                    <input className={inputCls} value={name} placeholder="Randy Marsh" onChange={e => setName(e.target.value)} />
                  </Field>
                  <Field label="Email">
                    <input className={inputCls} type="email" value={email} placeholder="randy.marsh@tegridy.com" onChange={e => setEmail(e.target.value)} />
                  </Field>
                </div>

                <Field label="Resume" hint="We extract the text to match you with roles — the file itself never leaves your browser.">
                  <Dropzone onFile={onFile} status={resumeStatus} fileName={resumeName} error={resumeError} />
                </Field>

                <Field label="Target roles / keywords" hint="Auto-filled from your resume — edit freely. Comma-separated.">
                  <input className={inputCls} value={roles} onChange={e => setRoles(e.target.value)}
                    placeholder="e.g. Product Designer, UX Researcher" />
                </Field>

                <Field label="Location">
                  <div className="grid sm:grid-cols-3 gap-3">
                    <Autocomplete value={country} placeholder="Country"
                      options={Object.keys(GEO)}
                      onChange={v => { setCountry(v); setState(""); setCity(""); }} />
                    <Autocomplete value={state} placeholder="State"
                      options={states}
                      onChange={v => { setState(v); setCity(""); }} />
                    <Autocomplete value={city} placeholder="City"
                      options={cities}
                      onChange={setCity}
                      disabled={!state} />
                  </div>
                </Field>

                <Field label="Work setting">
                  <SegmentGroup options={["Remote Only", "Hybrid", "Onsite", "Any"]} value={remote} onChange={setRemote} />
                </Field>

                <Field label="Salary range">
                  <SalarySlider min={salMin} max={salMax} onChange={(a, b) => { setSalMin(a); setSalMax(b); }} />
                </Field>

                <Field label="Seniority">
                  <SegmentGroup options={["Entry", "Mid", "Senior", "Any"]} value={seniority} onChange={setSeniority} />
                </Field>

                <Field label="Alert frequency">
                  <SegmentGroup cols={3} options={["3x daily", "Daily", "Weekly"]} value={frequency} onChange={setFrequency} />
                </Field>

                {submitError && (
                  <p className="mb-4 rounded-lg bg-red-50 dark:bg-red-950/40 border border-red-200 dark:border-red-900 px-3.5 py-2.5 text-sm text-red-600 dark:text-red-400">{submitError}</p>
                )}

                <button type="button" onClick={submit} disabled={!canSubmit}
                  className={"w-full rounded-xl py-3.5 text-sm font-bold tracking-wide transition shadow-sm " +
                    (canSubmit
                      ? "bg-gradient-to-r from-sky-600 to-blue-600 text-white hover:from-sky-700 hover:to-blue-700"
                      : "bg-slate-200 dark:bg-slate-800 text-slate-400 dark:text-slate-600 cursor-not-allowed")}>
                  {submitting ? "Deploying…" : "Save & Deploy Agent"}
                </button>
                {codeValid !== true ? (
                  <p className="mt-2 text-center text-xs text-slate-400 dark:text-slate-500">Enter a valid access token to deploy.</p>
                ) : !resumeText ? (
                  <p className="mt-2 text-center text-xs text-slate-400 dark:text-slate-500">Add your resume to deploy.</p>
                ) : null}
              </>
            )}
          </div>
        )}

        <p className="mt-6 text-center text-xs text-slate-400 dark:text-slate-600">
          Invite-only · Job Scout quietly checks the boards so you don't have to.
        </p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
