/* ---------------- access-code validation ----------------
   Typo-catching checksum only — real authorization happens server-side.
   Canonical algorithm: MUST match the admin invite generator exactly. */
const CODE_AB = "ABCDEFGHJKMNPQRSTUVWXYZ23456789"; // 31 chars, no 0/O/1/I/L
function codeChecksum(x) {
  let h = 7;
  for (const c of x) h = (h * 37 + CODE_AB.indexOf(c) * 13 + 29) % 923521;
  let o = "";
  for (let i = 0; i < 4; i++) { o = CODE_AB[h % 31] + o; h = Math.floor(h / 31); }
  return o;
}
const CODE_RE = /^SCOUT-([A-Z2-9]{4})-([A-Z2-9]{4})$/;
function isValidCode(code) {
  const m = (code || "").trim().toUpperCase().match(CODE_RE);
  return !!m && codeChecksum(m[1]) === m[2];
}

/* ---------------- helpers ---------------- */
function loadScript(src) {
  return new Promise((resolve, reject) => {
    if (document.querySelector('script[src="' + src + '"]')) return resolve();
    const s = document.createElement("script");
    s.src = src;
    s.onload = resolve;
    s.onerror = () => reject(new Error("Failed to load " + src));
    document.head.appendChild(s);
  });
}
async function extractPdf(file) {
  await loadScript("https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js");
  window.pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
  const data = await file.arrayBuffer();
  const pdf = await window.pdfjsLib.getDocument({ data }).promise;
  let text = "";
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    text += content.items.map(it => it.str).join(" ") + "\n";
  }
  return text.trim();
}
async function extractDocx(file) {
  await loadScript("https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js");
  const arrayBuffer = await file.arrayBuffer();
  const result = await window.mammoth.extractRawText({ arrayBuffer });
  return (result?.value || "").trim();
}
function extractEmail(text) {
  const m = (text || "").match(/[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}/);
  return m ? m[0] : "";
}
function extractName(text) {
  // Resumes almost always start with the person's name: grab 2-4 leading capitalized words.
  const head = (text || "").trim().slice(0, 120);
  const m = head.match(/^([A-ZÀ-Ý][A-Za-zÀ-ÿ'’.-]+(?:\s+[A-ZÀ-Ý][A-Za-zÀ-ÿ'’.-]+){1,3})/);
  if (!m) return "";
  const candidate = m[1].trim();
  // Reject if it looks like a heading, email, or is too long
  if (/resume|curriculum|vitae|@/i.test(candidate) || candidate.length > 40) return "";
  return candidate;
}
function extractKeywords(text) {
  const found = [];
  const lower = (text || "").toLowerCase();
  for (const kw of ROLE_KEYWORDS) {
    if (lower.includes(kw.toLowerCase()) && !found.includes(kw.trim())) found.push(kw.trim());
    if (found.length >= 5) break;
  }
  return found;
}

function Autocomplete({ value, onChange, options, placeholder, disabled }) {
  const [open, setOpen] = useState(false);
  const [hi, setHi] = useState(-1);
  const wrapRef = useRef(null);
  const filtered = useMemo(() => {
    const opts = options ?? [];
    const q = (value || "").toLowerCase().trim();
    if (!q) return opts.slice(0, 50);
    return opts.filter(o => o?.toLowerCase()?.includes(q)).slice(0, 50);
  }, [options, value]);
  useEffect(() => {
    const onDoc = e => { if (!wrapRef.current?.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", onDoc);
    return () => document.removeEventListener("mousedown", onDoc);
  }, []);
  const pick = v => { onChange(v); setOpen(false); setHi(-1); };
  return (
    <div ref={wrapRef} className="relative">
      <input
        className={inputCls + (disabled ? " opacity-50 cursor-not-allowed" : "")}
        value={value || ""}
        placeholder={placeholder}
        disabled={disabled}
        onChange={e => { onChange(e.target.value); setOpen(true); setHi(-1); }}
        onFocus={() => !disabled && setOpen(true)}
        onKeyDown={e => {
          if (e.key === "ArrowDown") { e.preventDefault(); setOpen(true); setHi(h => Math.min(h + 1, filtered.length - 1)); }
          else if (e.key === "ArrowUp") { e.preventDefault(); setHi(h => Math.max(h - 1, 0)); }
          else if (e.key === "Enter" && open && hi >= 0 && filtered[hi]) { e.preventDefault(); pick(filtered[hi]); }
          else if (e.key === "Escape") setOpen(false);
        }}
      />
      {open && filtered.length > 0 && (
        <ul className="absolute z-20 mt-1 w-full max-h-52 overflow-auto rounded-lg border border-stone-200 dark:border-stone-700 bg-white dark:bg-stone-900 shadow-lg shadow-stone-900/10 text-sm">
          {filtered.map((o, i) => (
            <li key={o + i}
                className={"px-3.5 py-2 cursor-pointer " + (i === hi ? "bg-pine-50 dark:bg-pine-950 text-pine-800 dark:text-pine-200" : "text-stone-700 dark:text-stone-300 hover:bg-stone-100 dark:hover:bg-stone-800")}
                onMouseEnter={() => setHi(i)}
                onMouseDown={e => { e.preventDefault(); pick(o); }}>
              {o}
            </li>
          ))}
        </ul>
      )}
    </div>
  );
}

function SalarySlider({ min, max, onChange }) {
  const LO = 50000, HI = 300000, STEP = 5000;
  const pct = v => ((v - LO) / (HI - LO)) * 100;
  return (
    <div className="pt-1">
      <div className="flex justify-between mb-2 text-sm font-semibold tabular-nums text-pine-700 dark:text-pine-300">
        <span>{fmtMoney(min)}</span>
        <span className="text-stone-400 dark:text-stone-500 font-normal">to</span>
        <span>{fmtMoney(max)}{max >= HI ? "+" : ""}</span>
      </div>
      <div className="relative h-5">
        <div className="absolute top-1/2 -translate-y-1/2 w-full h-1.5 rounded-full bg-stone-200 dark:bg-stone-700" />
        <div className="absolute top-1/2 -translate-y-1/2 h-1.5 rounded-full bg-pine-600 dark:bg-pine-400"
             style={{ left: pct(min) + "%", width: (pct(max) - pct(min)) + "%" }} />
        <input type="range" min={LO} max={HI} step={STEP} value={min}
               onChange={e => onChange(Math.min(+e.target.value, max - STEP), max)}
               className="range-thumb absolute w-full h-5 appearance-none bg-transparent pointer-events-none" />
        <input type="range" min={LO} max={HI} step={STEP} value={max}
               onChange={e => onChange(min, Math.max(+e.target.value, min + STEP))}
               className="range-thumb absolute w-full h-5 appearance-none bg-transparent pointer-events-none" />
      </div>
      <div className="flex justify-between mt-1.5 text-xs tabular-nums text-stone-400 dark:text-stone-500">
        <span>$50k</span><span>$300k+</span>
      </div>
    </div>
  );
}

function AgeSlider({ value, onChange }) {
  const LO = 1, HI = 16; // 16 renders as "15+"
  const pct = v => ((v - LO) / (HI - LO)) * 100;
  const label = v => v >= HI ? "15+ days (any age)" : v === 1 ? "1 day" : v + " days";
  return (
    <div className="pt-1">
      <div className="flex justify-between mb-2 text-sm font-semibold tabular-nums text-pine-700 dark:text-pine-300">
        <span>Posted within the last</span>

      </div>

        <div className="absolute top-1/2 -translate-y-1/2 w-full h-1.5 rounded-full bg-stone-200 dark:bg-stone-700" />

             style={{ left: "0%", width: pct(value) + "%" }} />
        <input type="range" min={LO} max={HI} step={1} value={value}
               onChange={e => onChange(+e.target.value)}

      </div>

        <span>1 day</span><span>15+ days</span>
      </div>
    </div>
  );
}

        </button>

}

/* ---------------- dropzone ---------------- */
function Dropzone({ onFile, status, fileName, error }) {
  const inputRef = useRef(null);
  const [drag, setDrag] = useState(false);
  const handleFiles = useCallback(files => {
    const f = files?.[0];
    if (f) onFile(f);
  }, [onFile]);
  return (
    <div role="button" tabIndex={0}
      onClick={() => inputRef.current?.click()}
      onKeyDown={e => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); inputRef.current?.click(); } }}
      onDragEnter={e => { e.preventDefault(); e.stopPropagation(); setDrag(true); }}
      onDragOver={e => { e.preventDefault(); e.stopPropagation(); setDrag(true); }}
      onDragLeave={e => { e.preventDefault(); e.stopPropagation(); setDrag(false); }}
      onDrop={e => { e.preventDefault(); e.stopPropagation(); setDrag(false); handleFiles(e.dataTransfer?.files); }}
      className={"cursor-pointer rounded-xl border-2 border-dashed px-6 py-8 text-center transition duration-200 select-none focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-pine-500 focus-visible:ring-offset-1 " +
        (drag ? "border-pine-500 bg-pine-50 dark:bg-pine-950"
              : "border-stone-300 dark:border-stone-700 bg-white dark:bg-stone-900 hover:border-pine-400 dark:hover:border-pine-600")}>
      <input ref={inputRef} type="file" accept=".pdf,.docx,.txt" className="hidden"
             onChange={e => { handleFiles(e.target.files); e.target.value = ""; }} />
      {status === "analyzing" ? (
        <div className="flex items-center justify-center gap-3 text-pine-700 dark:text-pine-300">
          <svg className="animate-spin h-5 w-5" viewBox="0 0 24 24" fill="none">
            <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" />
            <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z" />
          </svg>
          <span className="text-sm font-medium">Analyzing resume…</span>
        </div>
      ) : status === "done" ? (
        <div className="text-sm">
          <span className="inline-flex items-center gap-2 font-medium text-pine-700 dark:text-pine-300">
            <svg className="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.7-9.3a1 1 0 00-1.4-1.4L9 10.6 7.7 9.3a1 1 0 00-1.4 1.4l2 2a1 1 0 001.4 0l4-4z" clipRule="evenodd" /></svg>
            {fileName}
          </span>
          <p className="mt-1 text-xs text-stone-400 dark:text-stone-500">Resume parsed. Click or drop to replace.</p>
        </div>
      ) : (
        <div>
          <svg className="mx-auto h-8 w-8 text-stone-400 dark:text-stone-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="1.5">
            <path strokeLinecap="round" strokeLinejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" />
          </svg>
          <p className="mt-2 text-sm font-medium text-stone-700 dark:text-stone-300">Drop your resume here, or click to browse</p>
          <p className="mt-1 text-xs text-stone-400 dark:text-stone-500">PDF, DOCX, or TXT</p>
        </div>
      )}
      {error && <p className="mt-2 text-xs font-medium text-red-600 dark:text-red-400">{error}</p>}
    </div>
  );
}

/* ---------------- app ---------------- */
function App() {
  const [dark, setDark] = useState(() =>
    typeof window !== "undefined" && window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches
  );
  useEffect(() => { document.documentElement.classList.toggle("dark", dark); }, [dark]);

  const [mode, setMode] = useState("setup"); // "setup" | "pause"

  const [accessCode, setAccessCode] = useState("");
  const [codeValid, setCodeValid] = useState(null); // null | true | false
  const [name, setName] = useState("");
  const [email, setEmail] = useState("");
  const [resumeText, setResumeText] = useState("");
  const [resumeStatus, setResumeStatus] = useState("idle"); // idle | analyzing | done
  const [resumeName, setResumeName] = useState("");
  const [resumeError, setResumeError] = useState("");
  const [roles, setRoles] = useState("");
  const [country, setCountry] = useState("United States");
  const [state, setState] = useState("");
  const [city, setCity] = useState("");
  const [remote, setRemote] = useState("Any");
  const [salMin, setSalMin] = useState(100000);
  const [salMax, setSalMax] = useState(200000);
  const [seniority, setSeniority] = useState("Any");
  const [maxAge, setMaxAge] = useState(4); // max posting age in days; 16 = "15+" (no cap)
  const [frequency, setFrequency] = useState("Daily");
  const [submitting, setSubmitting] = useState(false);
  const [submitError, setSubmitError] = useState("");
  const [done, setDone] = useState(false);
  const [doneMode, setDoneMode] = useState("setup"); // which flow produced the success screen

  // live access-code check — checksum only; final authorization is server-side
  useEffect(() => {
    if (!accessCode) { setCodeValid(null); return; }
    setCodeValid(isValidCode(accessCode));
  }, [accessCode]);

  const states = useMemo(() => Object.keys(GEO?.[country] ?? {}), [country]);
  const cities = useMemo(() => GEO?.[country]?.[state] ?? [], [country, state]);

  const onFile = useCallback(async file => {
    setResumeError("");
    const ext = (file?.name?.split(".").pop() || "").toLowerCase();
    if (!["pdf", "docx", "txt"].includes(ext)) {
      setResumeError("Unsupported file type — please use .pdf, .docx, or .txt");
      return;
    }
    setResumeStatus("analyzing");
    setResumeName(file.name);
    const started = Date.now();
    try {
      let text = "";
      if (ext === "pdf") text = await extractPdf(file);
      else if (ext === "docx") text = await extractDocx(file);
      else text = (await file.text()).trim();
      if (!text || text.replace(/\s/g, "").length < 40) {
        // "Successful" parse but no real text — typical of scanned/image-based PDFs.
        const waitFail = Math.max(0, 1200 - (Date.now() - started));
        setTimeout(() => {
          setResumeText("");
          setResumeStatus("idle");
          setResumeError("We couldn't find readable text in that file — it may be a scanned or image-based PDF. Try a text-based PDF export, .docx, or .txt.");
        }, waitFail);
        return;
      }
      const kws = extractKeywords(text);
      const foundName = extractName(text);
      const foundEmail = extractEmail(text);
      const wait = Math.max(0, 1500 - (Date.now() - started));
      setTimeout(() => {
        setResumeText(text);
        if (kws.length) setRoles(prev => prev ? prev : kws.join(", "));
        if (foundName) setName(prev => prev ? prev : foundName);
        if (foundEmail) setEmail(prev => prev ? prev : foundEmail);
        setResumeStatus("done");
      }, wait);
    } catch (err) {
      console.error("Resume extraction failed:", err);
      setResumeStatus("idle");
      setResumeError("Could not read that file. Try a different format.");
    }
  }, []);

  const canSubmit = mode === "pause"
    ? (codeValid === true && !submitting)
    : (codeValid === true && name.trim() && email.trim() && resumeText && !submitting);

  async function submit() {
    if (!canSubmit) return;
    setSubmitting(true);
    setSubmitError("");
    const code = accessCode.trim().toUpperCase();
    const regions = [city, state, country].filter(Boolean).join(", ");
    // Payload keys are identical across both flows (contract unchanged).
    // Pause is signalled purely by frequency === "Paused"; other fields are ignored
    // by the paused branch, so we send safe empties.
    const payload = mode === "pause"
      ? { access_code: code, name: "", email: "", resume_text: "", target_roles: "", regions: "", remote: "", min_salary: 0, seniority: "", frequency: "Paused", max_posting_age: "", submitted_at: new Date().toISOString() }
      : { access_code: code, name: name.trim(), email: email.trim(), resume_text: resumeText, target_roles: roles.trim(), regions, remote, min_salary: salMin, seniority, frequency, max_posting_age: maxAge >= 16 ? "15+" : String(maxAge), submitted_at: new Date().toISOString() };
    try {
      const res = await fetch(HOOK_URL, { method: "POST", body: JSON.stringify(payload) });
      if (!res.ok) throw new Error("HTTP " + res.status);
      setDoneMode(mode);
      setDone(true);
    } catch (err) {
      console.error("Submit failed:", err);
      setSubmitError(mode === "pause"
        ? "Something went wrong pausing your agent. Please try again."
        : "Something went wrong sending your info. Please try again.");
    } finally {
      setSubmitting(false);
    }
  }

  function reset() {
    setMode("setup");
    setAccessCode(""); setCodeValid(null);
    setName(""); setEmail("");
    setResumeText(""); setResumeStatus("idle"); setResumeName(""); setResumeError("");
    setRoles("");
    setCountry("United States"); setState(""); setCity("");
    setRemote("Any"); setSalMin(100000); setSalMax(200000);
    setSeniority("Any"); setFrequency("Daily"); setMaxAge(4);
    setSubmitError(""); setDone(false);
  }

  function switchMode(next) { setMode(next); setSubmitError(""); }

  const primaryBtn = "w-full rounded-xl py-3.5 text-sm font-bold tracking-wide transition duration-200 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-pine-500 focus-visible:ring-offset-2 ";

  return (
    <div className="min-h-[100dvh] py-10 px-4">
      <div className="mx-auto max-w-xl stagger">

        {/* header */}
        <div className="flex items-end justify-between mb-8">
          <div>
            <p className="text-[11px] font-semibold uppercase tracking-[0.18em] text-pine-700 dark:text-pine-300">Invite-only</p>
            <h1 className="mt-1 font-display text-4xl font-semibold text-stone-900 dark:text-stone-50">Job Scout</h1>
            <p className="mt-1.5 text-sm text-stone-500 dark:text-stone-400">A scout that quietly checks the boards so you don't have to.</p>
          </div>
          <button type="button" onClick={() => setDark(d => !d)} aria-label="Toggle dark mode"
            className="rounded-lg border border-stone-300 dark:border-stone-700 bg-white dark:bg-stone-900 p-2 text-stone-500 dark:text-stone-400 hover:text-pine-700 dark:hover:text-pine-300 transition duration-200 active:scale-[0.96] focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-pine-500">
            {dark ? (
              <svg className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M12 3v1.5M12 19.5V21M4.2 4.2l1.06 1.06M18.74 18.74l1.06 1.06M3 12h1.5M19.5 12H21M4.2 19.8l1.06-1.06M18.74 5.26l1.06-1.06M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
            ) : (
              <svg className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M21.75 15A9.75 9.75 0 019 2.25 9.75 9.75 0 1021.75 15z" /></svg>
            )}
          </button>
        </div>

        {done ? (
          /* success view */
          <div className="rounded-2xl bg-white dark:bg-stone-900 ring-1 ring-stone-900/5 dark:ring-white/10 p-10 text-center shadow-[0_1px_2px_rgba(28,25,23,.04),0_20px_48px_-24px_rgba(28,25,23,.22)]">
            {doneMode === "pause" ? (
              <>
                <div className="mx-auto h-14 w-14 rounded-2xl bg-amber-100 dark:bg-amber-900/40 flex items-center justify-center">
                  <svg className="h-7 w-7 text-amber-700 dark:text-amber-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5"><path strokeLinecap="round" strokeLinejoin="round" d="M9 8.25v7.5M15 8.25v7.5" /></svg>
                </div>
                <h2 className="mt-5 font-display text-2xl font-semibold text-stone-900 dark:text-stone-50">Scout paused</h2>
                <p className="mt-2 text-sm leading-relaxed text-stone-500 dark:text-stone-400">
                  Your scout is on hold — no more matches for now. Congrats if you found a role. Come back and set it up again whenever you like.
                </p>
                <button type="button" onClick={reset}
                  className="mt-6 rounded-lg bg-pine-600 hover:bg-pine-700 px-5 py-2.5 text-sm font-semibold text-white transition duration-200 active:scale-[0.98] focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-pine-500 focus-visible:ring-offset-2 shadow-[0_8px_20px_-8px_rgba(34,101,81,.5)]">
                  Done
                </button>
              </>
            ) : (
              <>
                <div className="mx-auto h-14 w-14 rounded-2xl bg-pine-100 dark:bg-pine-950 flex items-center justify-center">
                  <svg className="h-7 w-7 text-pine-700 dark:text-pine-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5"><path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7" /></svg>
                </div>
                <h2 className="mt-5 font-display text-2xl font-semibold text-stone-900 dark:text-stone-50">Your scout is live</h2>
                <p className="mt-2 text-sm leading-relaxed text-stone-500 dark:text-stone-400">
                  Watch your inbox — matching roles will start arriving on your chosen schedule.
                </p>
                <button type="button" onClick={reset}
                  className="mt-6 rounded-lg bg-pine-600 hover:bg-pine-700 px-5 py-2.5 text-sm font-semibold text-white transition duration-200 active:scale-[0.98] focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-pine-500 focus-visible:ring-offset-2 shadow-[0_8px_20px_-8px_rgba(34,101,81,.5)]">
                  Set up another
                </button>
              </>
            )}
          </div>
        ) : (
          /* form */
          <div className="rounded-2xl bg-white dark:bg-stone-900 ring-1 ring-stone-900/5 dark:ring-white/10 p-6 sm:p-8 shadow-[0_1px_2px_rgba(28,25,23,.04),0_20px_48px_-24px_rgba(28,25,23,.22)]">

            {/* mode toggle */}
            <div className="mb-6 grid grid-cols-2 gap-2">
              <button type="button" onClick={() => switchMode("setup")}
                className={"rounded-lg border px-3 py-2.5 text-sm font-medium transition duration-200 active:scale-[0.98] focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-pine-500 " +
                  (mode === "setup"
                    ? "border-pine-600 bg-pine-600 text-white shadow-sm"
                    : "border-stone-300 dark:border-stone-700 bg-white dark:bg-stone-900 text-stone-600 dark:text-stone-400 hover:border-pine-400 dark:hover:border-pine-600")}>
                Set up / update
              </button>
              <button type="button" onClick={() => switchMode("pause")}
                className={"rounded-lg border px-3 py-2.5 text-sm font-medium transition duration-200 active:scale-[0.98] focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-amber-500 " +
                  (mode === "pause"
                    ? "border-amber-600 bg-amber-600 text-white shadow-sm"
                    : "border-stone-300 dark:border-stone-700 bg-white dark:bg-stone-900 text-stone-600 dark:text-stone-400 hover:border-amber-500 dark:hover:border-amber-600")}>
                Pause — I found a role
              </button>
            </div>

            <Field label="Access token">
              <div className="relative">
                <input
                  className={inputCls + " pr-10 font-mono tracking-wide"}
                  value={accessCode}
                  placeholder="SCOUT-XXXX-XXXX"
                  onChange={e => setAccessCode(e.target.value.toUpperCase())}
                  autoComplete="off" spellCheck="false"
                />
                {codeValid !== null && (
                  <span className="absolute right-3 top-1/2 -translate-y-1/2">
                    {codeValid
                      ? <svg className="h-5 w-5 text-pine-500" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.7-9.3a1 1 0 00-1.4-1.4L9 10.6 7.7 9.3a1 1 0 00-1.4 1.4l2 2a1 1 0 001.4 0l4-4z" clipRule="evenodd" /></svg>
                      : <svg className="h-5 w-5 text-red-400" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.7 7.3a1 1 0 00-1.4 1.4L8.6 10l-1.3 1.3a1 1 0 101.4 1.4L10 11.4l1.3 1.3a1 1 0 001.4-1.4L11.4 10l1.3-1.3a1 1 0 00-1.4-1.4L10 8.6 8.7 7.3z" clipRule="evenodd" /></svg>}
                  </span>
                )}
              </div>
              {codeValid === false && <p className="mt-1 text-xs font-medium text-red-600 dark:text-red-400">That token doesn't look right. Check your invite.</p>}
            </Field>

            {mode === "pause" ? (
              /* pause flow — code only */
              <>
                <p className="mb-5 text-sm leading-relaxed text-stone-500 dark:text-stone-400">
                  Found a role, or need a break? Enter your access token and we'll pause your scout — no more match emails until you set it up again.
                </p>
                {submitError && (
                  <p className="mb-4 rounded-lg bg-red-50 dark:bg-red-950/40 border border-red-200 dark:border-red-900 px-3.5 py-2.5 text-sm text-red-600 dark:text-red-400">{submitError}</p>
                )}
                <button type="button" onClick={submit} disabled={!canSubmit}
                  className={primaryBtn + (canSubmit
                    ? "bg-amber-600 text-white hover:bg-amber-700 active:scale-[0.99] shadow-[0_8px_20px_-8px_rgba(180,83,9,.5)]"
                    : "bg-stone-200 dark:bg-stone-800 text-stone-400 dark:text-stone-600 cursor-not-allowed")}>
                  {submitting ? "Pausing…" : "Pause my agent"}
                </button>
                {codeValid !== true && (
                  <p className="mt-2 text-center text-xs text-stone-400 dark:text-stone-500">Enter your access token to pause.</p>
                )}
              </>
            ) : (
              /* setup / update flow — full form */
              <>
                <div className="grid sm:grid-cols-2 gap-4">
                  <Field label="Name">
                    <input className={inputCls} value={name} placeholder="Randy Marsh" onChange={e => setName(e.target.value)} />
                  </Field>
                  <Field label="Email">
                    <input className={inputCls} type="email" value={email} placeholder="randy.marsh@tegridy.com" onChange={e => setEmail(e.target.value)} />
                  </Field>
                </div>

                <Field label="Resume" hint="We extract the text to match you with roles — the file itself never leaves your browser.">
                  <Dropzone onFile={onFile} status={resumeStatus} fileName={resumeName} error={resumeError} />
                </Field>

                <Field label="Target roles / keywords" hint="Auto-filled from your resume — edit freely. Comma-separated.">
                  <input className={inputCls} value={roles} onChange={e => setRoles(e.target.value)} placeholder="e.g. Product Designer, UX Researcher" />
                </Field>

                <Field label="Location">
                  <div className="grid sm:grid-cols-3 gap-3">
                    <Autocomplete value={country} placeholder="Country" options={Object.keys(GEO)} onChange={v => { setCountry(v); setState(""); setCity(""); }} />
                    <Autocomplete value={state} placeholder="State" options={states} onChange={v => { setState(v); setCity(""); }} />
                    <Autocomplete value={city} placeholder="City" options={cities} onChange={setCity} disabled={!state} />
                  </div>
                </Field>

                <Field label="Work setting">
                  <SegmentGroup options={["Remote Only", "Hybrid", "Onsite", "Any"]} value={remote} onChange={setRemote} />
                </Field>

                <Field label="Salary range">
                  <SalarySlider min={salMin} max={salMax} onChange={(a, b) => { setSalMin(a); setSalMax(b); }} />
                </Field>

                <Field label="Seniority">
                  <SegmentGroup options={["Entry", "Mid", "Senior", "Any"]} value={seniority} onChange={setSeniority} />
                </Field>

                <Field label="Posting freshness" hint="Only postings newer than this will be emailed to you. Fresher = fewer but hotter leads.">
                  <AgeSlider value={maxAge} onChange={setMaxAge} />
                </Field>

                <Field label="Alert frequency">
                  <SegmentGroup cols={3} options={["3x daily", "Daily", "Weekly"]} value={frequency} onChange={setFrequency} />
                </Field>

                {submitError && (
                  <p className="mb-4 rounded-lg bg-red-50 dark:bg-red-950/40 border border-red-200 dark:border-red-900 px-3.5 py-2.5 text-sm text-red-600 dark:text-red-400">{submitError}</p>
                )}

                <button type="button" onClick={submit} disabled={!canSubmit}
                  className={primaryBtn + (canSubmit
                    ? "bg-pine-600 text-white hover:bg-pine-700 active:scale-[0.99] shadow-[0_8px_20px_-8px_rgba(34,101,81,.5)]"
                    : "bg-stone-200 dark:bg-stone-800 text-stone-400 dark:text-stone-600 cursor-not-allowed")}>
                  {submitting ? "Deploying…" : "Save & deploy agent"}
                </button>
                {codeValid !== true ? (
                  <p className="mt-2 text-center text-xs text-stone-400 dark:text-stone-500">Enter a valid access token to deploy.</p>
                ) : (() => {
                  const missing = [!resumeText && "resume", !name.trim() && "name", !email.trim() && "email"].filter(Boolean);
                  return missing.length
                    ? <p className="mt-2 text-center text-xs text-stone-400 dark:text-stone-500">{"Add your " + missing.join(" + ") + " to deploy."}</p>
                    : null;
                })()}
              </>
            )}
          </div>
        )}

        <p className="mt-6 text-center text-xs text-stone-400 dark:text-stone-600">
          Invite-only · Job Scout quietly checks the boards so you don't have to.
        </p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
